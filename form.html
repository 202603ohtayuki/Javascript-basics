<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Stylesheet.css">
    <title>フォーム</title>
</head>

<body>
    <h1>フォーム</h1>

    <div class="container">
        <div class="form-group">
            <label for="name">名前</label>
        <input type="text" id="name" placeholder="例：アレッシオ">
    </div>

    <div class="form-group">
            <label for="age">年齢</label>
        <input type="number" id="age" placeholder="例：36">
    </div>

    <div class="form-group">
            <label for="foods">好きな食べ物</label>
        <input type="text" id="foods" placeholder="例：うどん等">
    </div>
    <div class="form-group">
            <label>プログラミング好きですか？</label>
        <div class="chackbox-row">
            <input type="checkbox" id="program">
            <span>好きです</span>

        </div>
    </div>
    <button id="run">実行</button>
    <div class="mini-title">まとめ</div>
    <div class="result" id="result">ここに結果がでます</div>

    </div>

    <script src="./script2.js"></script>
</body>
</html>
